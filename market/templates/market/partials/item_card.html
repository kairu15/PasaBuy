<article class="item-card">
    {% if item.image %}
        <button class="item-image image-preview-trigger" type="button" data-image-src="{{ item.image.url }}" data-image-alt="{{ item.name }}" aria-label="Display {{ item.name }} image">
            <img src="{{ item.image.url }}" alt="{{ item.name }}">
        </button>
    {% elif item.image_url %}
        <button class="item-image image-preview-trigger" type="button" data-image-src="{{ item.image_url }}" data-image-alt="{{ item.name }}" aria-label="Display {{ item.name }} image">
            <img src="{{ item.image_url }}" alt="{{ item.name }}">
        </button>
    {% else %}
        <div class="item-image"><span>{{ item.name|first }}</span></div>
    {% endif %}
    <div class="item-body">
        <p class="eyebrow">{{ item.category|default:"Item" }}</p>
        <h3>{{ item.name }}</h3>
        <p>{{ item.description|truncatechars:90 }}</p>
        <div class="item-meta">
            <strong>PHP {{ item.price }}</strong>
            <span>{{ item.stock }} in stock</span>
        </div>
        <div class="item-actions">
            <form method="post" action="{% url 'add_to_cart' item.id %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.get_full_path }}">
                <input type="number" name="quantity" min="1" max="{{ item.stock }}" value="1" aria-label="Quantity">
                <button type="submit">Add</button>
            </form>
            <form method="post" action="{% url 'buy_now' item.id %}">
                {% csrf_token %}
                <button class="buy-now-button" type="submit">Buy</button>
            </form>
        </div>
    </div>
</article>
