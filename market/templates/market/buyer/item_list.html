{% extends "market/base.html" %}
{% block title %}Shop - PasaBuy{% endblock %}
{% block content %}
<section class="section-header">
    <div>
        <p class="eyebrow">Shop</p>
        <h1>Available items</h1>
    </div>
</section>
<form class="filter-bar" method="get">
    <input type="search" name="q" value="{{ query }}" placeholder="Search items">
    <select name="category">
        <option value="">All categories</option>
        {% for value in categories %}
            <option value="{{ value }}" {% if value == category %}selected{% endif %}>{{ value }}</option>
        {% endfor %}
    </select>
    <button type="submit">Search</button>
</form>
<div class="item-grid">
    {% for item in items %}
        {% include "market/partials/item_card.html" with item=item %}
    {% empty %}
        <div class="empty-state">No items match your filters.</div>
    {% endfor %}
</div>
{% endblock %}
